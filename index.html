<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Family Slider</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Jost:wght@400;500;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="bg-overlay"></div>
  <div class="vignette"></div>
  <div class="hearts"></div>

  <section class="slider-container">
    <div class="slider-images">

      <div class="slider-img">
        <img src="Images/1.png" alt="Son">
        <h1>Son</h1>
        <div class="details">
          <h2>Son</h2>
          <div class="line"></div>
          <p>Future of the family</p>
        </div>
      </div>

      <div class="slider-img">
        <img src="Images/2.png" alt="Father">
        <h1>Father</h1>
        <div class="details">
          <h2>Father</h2>
          <div class="line"></div>
          <p>Strength of the family</p>
        </div>
      </div>

      <div class="slider-img active family-center">
        <div class="glow-ring"></div>
        <img src="Images/3.png" alt="Family">
        <h1>Family</h1>
        <div class="details">
          <h2>Family</h2>
          <div class="line"></div>
          <p>Together Forever</p>
        </div>
      </div>

      <div class="slider-img">
        <img src="Images/4.png" alt="Mother">
        <h1>Mother</h1>
        <div class="details">
          <h2>Mother</h2>
          <div class="line"></div>
          <p>Heart of the family</p>
        </div>
      </div>

      <div class="slider-img">
        <img src="Images/5.png" alt="Daughter">
        <h1>Daughter</h1>
        <div class="details">
          <h2>Daughter</h2>
          <div class="line"></div>
          <p>Joy of the family</p>
        </div>
      </div>

    </div>
  </section>

  <audio id="slideSound" src="sounds/whoosh.mp3"></audio>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="Query.js"></script>

</body>
</html>
